# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.34.1/secret.json
# Encrypt before committing:
#   sops --encrypt --in-place kubernetes/apps/flux-system/konflate/app/secret.sops.yaml
#
# KONFLATE_TOKEN — read-only PAT; raises the 60 req/hr anonymous rate limit.
#   Fine-grained, scoped to this repo: Metadata:R, Contents:R (git fetch),
#   Pull requests:R (list PRs), Commit statuses:R (CI-status pill).
#   Classic equivalent: public_repo.
#
# KONFLATE_WRITE_TOKEN — write-back PAT, separate so it carries only write scope.
#   Fine-grained, scoped to this repo: Commit statuses:RW (KONFLATE_STATUS_CHECKS)
#   + Pull requests:RW (KONFLATE_PR_COMMENTS). Classic repo:status covers statuses
#   only, so prefer fine-grained over granting full `repo`.
#   Posts a plain commit status; a rich Check Run needs a GitHub App with Checks:RW.
#
# KONFLATE_WEBHOOK_SECRET — not a PAT; a random shared string (openssl rand -hex 32)
#   set identically on the GitHub webhook that POSTs to /hooks.
