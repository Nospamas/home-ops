---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      home-assistant:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |-
              [{
                "name": "iot",
                "namespace": "network",
                "ips": ["${IP_IOT_HOME_ASSISTANT}/16", "${IP6_IOT_HOME_ASSISTANT}/64"]
              }]
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.4.1@sha256:1000851ce4d5bf2f6790bfc8b9052daa2c33a84f92e0bad7d60e0a9333ff4dc2
            env:
              TZ: ${CLUSTER_TIMEZONE}
              HOME_ASSISTANT__HACS_INSTALL: "true"
              HASS_RECORDER_DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-postgres
                    key: url
            envFrom:
              - secretRef:
                  name: home-assistant-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 4Gi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.117.0@sha256:e6702766518b961c7e3c41095c129c7c9a82b041578c53326c52fa363a057727
            env:
              TZ: ${CLUSTER_TIMEZONE}
            args:
              - --auth
              - none
              - --user-data-dir
              - /config/.vscode
              - --extensions-dir
              - /config/.vscode
              - --port
              - "12321"
              - /config
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 4Gi

    service:
      app:
        controller: home-assistant
        type: LoadBalancer
        ipFamilyPolicy: SingleStack
        ipFamilies:
          - IPv4
        annotations:
          lbipam.cilium.io/ips: "${IP_SVC_HOME_ASSISTANT}, ${IP6_SVC_HOME_ASSISTANT}"
        ports:
          http:
            port: 8123
            primary: true
      code:
        controller: home-assistant
        type: LoadBalancer
        ipFamilyPolicy: SingleStack
        ipFamilies:
          - IPv4
        annotations:
          lbipam.cilium.io/ips: "${IP_SVC_HOME_ASSISTANT_CODE}, ${IP6_SVC_HOME_ASSISTANT_CODE}"
        ports:
          code-server:
            port: 12321

    route:
      app:
        hostnames:
          - hass.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
        # annotations:
        #   gethomepage.dev/enabled: "true"
        #   gethomepage.dev/name: Home Assistant
        #   gethomepage.dev/group: Self Hosted
        #   gethomepage.dev/icon: home-assistant.svg
        #   gethomepage.dev/description: Home Automation
        #   gethomepage.dev/widget.type: homeassistant
        #   gethomepage.dev/widget.url: http://home-assistant.self-hosted:8123
        #   gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_HOMEASSISTANT_KEY}}"
      code-server:
        hostnames:
          - hass-code.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: code
                port: code-server

    persistence:
      config:
        type: configMap
        name: home-assistant-configmap
        globalMounts:
          - path: /config/configuration.yaml
            subPath: configuration.yaml
      data:
        existingClaim: *app
        advancedMounts:
          home-assistant:
            app:
              - path: /config
            code-server:
              - path: /config
      cache:
        size: 2Gi
        accessMode: ReadWriteOnce
        storageClass: longhorn-fast
        suffix: cache
        advancedMounts:
          home-assistant:
            app:
              - path: /config/.venv
                subPath: venv
            code-server:
              - path: /config/.venv
                subPath: venv
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /config/logs
            subPath: logs
          - path: /config/tts
            subPath: tts
          - path: /tmp
            subPath: tmp
