---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      palworld:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/thijsvanloef/palworld-server-docker
              # renovate: datasource=docker depName=ghcr.io/thijsvanloef/palworld-server-docker
              tag: v2.6.0@sha256:85ae20d8756dd398ec24f4253a59b80907e5ffe411148a67b2c80c4527a8855e
            env:
              TZ: ${CLUSTER_TIMEZONE}
              PUID: "1000"
              PGID: "1000"
              PORT: "8211"
              QUERY_PORT: "27015"
              PLAYERS: "16"
              # -useperfthreads -NoAsyncLoadingThread -UseMultithreadForDS
              ENABLE_PERF_THREADING_ARGS: "true"
              # First boot installs the server via steamcmd — must stay true
              UPDATE_ON_BOOT: "true"
              # Backups are handled by the volsync component, not the image
              BACKUP_ENABLED: "false"
              COMMUNITY: "false"
              SERVER_NAME: "Pals of Nospamas"
              SERVER_DESCRIPTION: "Palworld dedicated server"
              CROSSPLAY_PLATFORMS: "(Steam,Xbox,PS5,Mac)"
              REST_API_ENABLED: "true"
              REST_API_PORT: "8212"
              ENABLE_VOICE_CHAT: true
            envFrom:
              - secretRef:
                  name: palworld-secret
            probes:
              # REST API only answers once the world has finished loading
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8212
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8212
                  # First boot downloads several GB via steamcmd — allow ~15m
                  failureThreshold: 60
                  periodSeconds: 15
            securityContext:
              seccompProfile: { type: RuntimeDefault }
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 16Gi
    defaultPodOptions:
      # The image starts as root to run steamcmd + chown, then drops to PUID/PGID.
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: palworld
        type: LoadBalancer
        # All nodes BGP-advertise the VIP to the router, so `Cluster` lets it ECMP
        # a single UDP session across nodes, each SNATing to its own IP — the game
        # sees the client's source flip and the session resets. `Local` advertises
        # only from the node with the pod and preserves the client IP.
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: "${IP_SVC_PALWORLD}"
        ports:
          game:
            port: 8211
            protocol: UDP
          query:
            port: 27015
            protocol: UDP
    persistence:
      palworld:
        existingClaim: palworld
        globalMounts:
          - path: /palworld
