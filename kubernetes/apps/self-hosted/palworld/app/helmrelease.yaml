---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      palworld:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/thijsvanloef/palworld-server-docker
              # renovate: datasource=docker depName=ghcr.io/thijsvanloef/palworld-server-docker
              tag: v2.7.0@sha256:4145c58737fcd9f9f03d35de6bf33c0008b829b65d3080822bc46830bdb38fdf
            env:
              TZ: ${CLUSTER_TIMEZONE}
              PUID: "1000"
              PGID: "1000"
              PORT: "8211"
              QUERY_PORT: "27015"
              PLAYERS: "16"
              # -useperfthreads -NoAsyncLoadingThread -UseMultithreadForDS
              ENABLE_PERF_THREADING_ARGS: "true"
              # First boot installs the server via steamcmd — must stay true
              UPDATE_ON_BOOT: "true"
              # Backups are handled by the volsync component, not the image
              COMMUNITY: "false"
              SERVER_NAME: "Pals of Nospamas"
              SERVER_DESCRIPTION: "Palworld dedicated server"
              CROSSPLAY_PLATFORMS: "(Steam,Xbox,PS5,Mac)"
              REST_API_ENABLED: "true"
              REST_API_PORT: "8212"
              ENABLE_VOICE_CHAT: true
              BASE_CAMP_WORKER_MAX_NUM: 20
              LOG_LEVEL: "INFO"
            envFrom:
              - secretRef:
                  name: palworld-secret
            probes:
              # REST API only answers once the world has finished loading
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8212
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8212
                  # First boot downloads several GB via steamcmd — allow ~15m
                  failureThreshold: 60
                  periodSeconds: 15
            securityContext:
              seccompProfile: { type: RuntimeDefault }
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 16Gi
    defaultPodOptions:
      # Pinned to ctrl-02 to stay co-located with the palworld-l2 ARP announcer and
      # the sole BGP advertiser (externalTrafficPolicy: Local). Single-replica anyway.
      nodeSelector:
        kubernetes.io/hostname: ctrl-02
      # The image starts as root to run steamcmd + chown, then drops to PUID/PGID.
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: palworld
        type: LoadBalancer
        # Local keeps the client's real IP and makes only the pod's node advertise
        # the VIP over BGP (no router ECMP spray). The pod and the ARP announcer are
        # both pinned to ctrl-02 so this node always has a local backend.
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: "${IP_SVC_PALWORLD}"
        ports:
          game:
            port: 8211
            protocol: UDP
          query:
            port: 27015
            protocol: UDP
    persistence:
      palworld:
        existingClaim: palworld
        globalMounts:
          - path: /palworld
