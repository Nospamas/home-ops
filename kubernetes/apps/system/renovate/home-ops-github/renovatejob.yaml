apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  annotations:
  name: renovate-github
  namespace: renovate-operator
spec:
  schedule: 0 * * * *
  discoveryFilters:
    - nospamas/home-ops
  provider:
    name: github
  extraEnv:
    - name: RENOVATE_ALLOW_PLUGINS
      value: "true"
    # - name: RENOVATE_LOG_LEVEL
    #   value: debug
  image: ghcr.io/renovatebot/renovate:43.260.2
  parallelism: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  # The operator mints an installation token from the App and injects it as
  # RENOVATE_TOKEN, refreshing it when under 30m TTL. No PAT for the platform.
  githubAppReference:
    secretName: renovate-github-app
    appIdSecretKey: APP_ID
    installationIdSecretKey: INSTALL_ID
    pemSecretKey: PEM
  # Still carries GITHUB_COM_TOKEN: an installation token can't read changelogs
  # from third-party public repos, so that one stays a (scopeless) PAT.
  secretRef: renovate-secret