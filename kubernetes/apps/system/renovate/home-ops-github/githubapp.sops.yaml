# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.34.1/secret.json
# Credentials for the shared "home-ops" GitHub App (also used by konflate).
# Read ONLY by renovate-operator, which signs a JWT, exchanges it for an
# installation token, and injects that as RENOVATE_TOKEN into the job. The PEM
# never reaches the renovate container itself — that's why this is a separate
# secret from renovate-secret (which is envFrom'd wholesale into the job).
#
# APP_ID     — the *numeric* App ID (konflate uses the Client ID instead; not the same value).
# INSTALL_ID — installation id: https://github.com/settings/installations → Configure → trailing URL segment.
# PEM        — the App private key, same PEM as KONFLATE_APP_PRIVATE_KEY.
#
# Encrypt before committing:
#   sops --encrypt --in-place kubernetes/apps/system/renovate/home-ops-github/githubapp.sops.yaml
apiVersion: v1
kind: Secret
metadata:
  name: renovate-github-app
type: Opaque
stringData:
