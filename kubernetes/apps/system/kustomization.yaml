---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: system
components:
  - ../../components/common
resources:
  - ./node-feature-discovery/ks.yaml
  - ./reflector/ks.yaml
  - ./reloader/ks.yaml
  - ./spegel/ks.yaml
  - ./intel/common/helmrepository.yaml
  - ./intel/ks.yaml
  - ./tuppr/ks.yaml
  - ./renovate/ks.yaml
  - ./descheduler/ks.yaml
patches:
  # privileged on namespace for Intel GPU device plugin
  - patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: system
        labels:
          pod-security.kubernetes.io/enforce: "privileged"
          pod-security.kubernetes.io/audit: "privileged"
          pod-security.kubernetes.io/warn: "privileged"
    target:
      kind: Namespace