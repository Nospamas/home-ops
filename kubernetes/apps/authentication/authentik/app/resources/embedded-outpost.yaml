# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: embedded-outpost
  labels:
    blueprints.goauthentik.io/instance: embedded-outpost
entries:
  - model: authentik_outposts.outpost
    identifiers:
      managed: goauthentik.io/outposts/embedded
    attrs:
      name: authentik Embedded Outpost
      type: proxy
      providers:
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for bazarr]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for prowlarr]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for radarr]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for sonarr]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, Provider for homepage]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, code-server]]
