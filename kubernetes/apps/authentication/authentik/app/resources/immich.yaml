# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: immich
  labels:
    blueprints.goauthentik.io/instance: immich
entries:
  # OAuth2 / OpenID Connect provider for Immich (web + mobile app callbacks).
  # client_secret is read from the AUTHENTIK_IMMICH_CLIENT_SECRET env var
  - model: authentik_providers_oauth2.oauth2provider
    id: immich-provider
    identifiers:
      name: Provider for immich
    attrs:
      name: Provider for immich
      client_type: confidential
      client_id: SYvLUCAjYxOJRZsqFq5I8Xxs41GtpAIdLldEYe8W
      client_secret: !Env AUTHENTIK_IMMICH_CLIENT_SECRET
      sub_mode: hashed_user_id
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_core.propertymapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_core.propertymapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_core.propertymapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      redirect_uris:
        - matching_mode: strict
          url: app.immich:///oauth-callback
        - matching_mode: strict
          url: https://photos.${SECRET_DOMAIN}/auth/login
        - matching_mode: strict
          url: https://photos.${SECRET_DOMAIN}/user-settings
  - model: authentik_core.application
    identifiers:
      slug: immich
    attrs:
      name: immich
      slug: immich
      group: self-hosted
      provider: !KeyOf immich-provider
