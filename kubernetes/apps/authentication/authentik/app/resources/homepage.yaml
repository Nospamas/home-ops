# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: homepage
  labels:
    blueprints.goauthentik.io/instance: homepage
entries:
  # Proxy provider (forward auth, single application) fronted by the embedded
  # outpost + Envoy SecurityPolicy on home.${SECRET_DOMAIN}.
  - model: authentik_providers_proxy.proxyprovider
    id: homepage-provider
    identifiers:
      name: Provider for homepage
    attrs:
      name: Provider for homepage
      mode: forward_single
      external_host: https://home.${SECRET_DOMAIN}
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    identifiers:
      slug: homepage
    attrs:
      name: homepage
      slug: homepage
      group: self-hosted
      provider: !KeyOf homepage-provider
      meta_launch_url: https://home.${SECRET_DOMAIN}