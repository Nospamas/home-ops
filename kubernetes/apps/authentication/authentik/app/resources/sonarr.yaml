# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: sonarr
  labels:
    blueprints.goauthentik.io/instance: sonarr
entries:
  # Proxy provider (forward auth, single application) fronted by the embedded
  # outpost + Envoy SecurityPolicy on sonarr.${SECRET_DOMAIN}.
  - model: authentik_providers_proxy.proxyprovider
    id: sonarr-provider
    identifiers:
      name: Provider for sonarr
    attrs:
      name: Provider for sonarr
      mode: forward_single
      external_host: https://sonarr.${SECRET_DOMAIN}
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    identifiers:
      slug: sonarr
    attrs:
      name: sonarr
      slug: sonarr
      group: arr-stack
      provider: !KeyOf sonarr-provider
      meta_launch_url: https://sonarr.${SECRET_DOMAIN}
