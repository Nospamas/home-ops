# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: bazarr
  labels:
    blueprints.goauthentik.io/instance: bazarr
entries:
  # Proxy provider (forward auth, single application) fronted by the embedded
  # outpost + Envoy SecurityPolicy on bazarr.${SECRET_DOMAIN}.
  - model: authentik_providers_proxy.proxyprovider
    id: bazarr-provider
    identifiers:
      name: Provider for bazarr
    attrs:
      name: Provider for bazarr
      mode: forward_single
      external_host: https://bazarr.${SECRET_DOMAIN}
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    identifiers:
      slug: bazarr
    attrs:
      name: bazarr
      slug: bazarr
      group: arr-stack
      provider: !KeyOf bazarr-provider
      meta_launch_url: https://bazarr.${SECRET_DOMAIN}
  # This provider is bound to the "authentik Embedded Outpost" by the
  # embedded-outpost.yaml blueprint (the single source of truth for that list).
