# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: radarr
  labels:
    blueprints.goauthentik.io/instance: radarr
entries:
  # Proxy provider (forward auth, single application) fronted by the embedded
  # outpost + Envoy SecurityPolicy on radarr.${SECRET_DOMAIN}.
  - model: authentik_providers_proxy.proxyprovider
    id: radarr-provider
    identifiers:
      name: Provider for radarr
    attrs:
      name: Provider for radarr
      mode: forward_single
      external_host: https://radarr.${SECRET_DOMAIN}
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    identifiers:
      slug: radarr
    attrs:
      name: radarr
      slug: radarr
      group: arr-stack
      provider: !KeyOf radarr-provider
      meta_launch_url: https://radarr.${SECRET_DOMAIN}
