# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: prowlarr
  labels:
    blueprints.goauthentik.io/instance: prowlarr
entries:
  # Proxy provider (forward auth, single application) fronted by the embedded
  # outpost + Envoy SecurityPolicy on prowlarr.${SECRET_DOMAIN}.
  - model: authentik_providers_proxy.proxyprovider
    id: prowlarr-provider
    identifiers:
      name: Provider for prowlarr
    attrs:
      name: Provider for prowlarr
      mode: forward_single
      external_host: https://prowlarr.${SECRET_DOMAIN}
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    identifiers:
      slug: prowlarr
    attrs:
      name: prowlarr
      slug: prowlarr
      group: arr-stack
      provider: !KeyOf prowlarr-provider
      meta_launch_url: https://prowlarr.${SECRET_DOMAIN}
