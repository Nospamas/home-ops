# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: grafana
  labels:
    blueprints.goauthentik.io/instance: grafana
entries:
  # OAuth2 / OpenID Connect provider for Grafana's generic_oauth integration.
  # client_secret is read from the AUTHENTIK_GRAFANA_CLIENT_SECRET env var
  # (sourced from the authentik-secret)
  - model: authentik_providers_oauth2.oauth2provider
    id: grafana-provider
    identifiers:
      name: Provider for grafana
    attrs:
      name: Provider for grafana
      client_type: confidential
      client_id: JXTj3AGsyzBudrjuJWW6RgXjf8roHNNnCv257p3b
      client_secret: !Env AUTHENTIK_GRAFANA_CLIENT_SECRET
      sub_mode: hashed_user_id
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_core.propertymapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_core.propertymapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_core.propertymapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      redirect_uris:
        - matching_mode: strict
          url: https://grafana.${SECRET_DOMAIN}/login/generic_oauth
  - model: authentik_core.application
    identifiers:
      slug: grafana
    attrs:
      name: grafana
      slug: grafana
      group: observability
      provider: !KeyOf grafana-provider
      meta_launch_url: https://grafana.${SECRET_DOMAIN}
